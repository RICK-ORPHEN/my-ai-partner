<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Slide Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="app-container">
        <!-- ヘッダー -->
        <header class="app-header">
            <h1 class="logo">AI Slide Generator</h1>
            <p class="tagline">テキストを入力するだけで、プロ品質のスライドを自動生成</p>
        </header>

        <!-- ステップ表示 -->
        <div class="steps">
            <div class="step active" data-step="1">
                <span class="step-num">1</span>
                <span class="step-label">テンプレート選択</span>
            </div>
            <div class="step" data-step="2">
                <span class="step-num">2</span>
                <span class="step-label">内容入力</span>
            </div>
            <div class="step" data-step="3">
                <span class="step-num">3</span>
                <span class="step-label">生成</span>
            </div>
        </div>

        <!-- Step 1: テンプレート選択 -->
        <section id="step1" class="step-content active">
            <h2>テンプレートを選択</h2>
            <div class="template-grid">
                <div class="template-card selected" data-template="business-blue">
                    <div class="template-preview business-blue-preview">
                        <div class="preview-title-bar"></div>
                        <div class="preview-content">
                            <div class="preview-line w80"></div>
                            <div class="preview-line w60"></div>
                            <div class="preview-line w70"></div>
                        </div>
                    </div>
                    <span class="template-name">ビジネスブルー</span>
                </div>
                <div class="template-card" data-template="modern-dark">
                    <div class="template-preview modern-dark-preview">
                        <div class="preview-title-bar"></div>
                        <div class="preview-content">
                            <div class="preview-line w80"></div>
                            <div class="preview-line w60"></div>
                            <div class="preview-line w70"></div>
                        </div>
                    </div>
                    <span class="template-name">モダンダーク</span>
                </div>
                <div class="template-card" data-template="nature-green">
                    <div class="template-preview nature-green-preview">
                        <div class="preview-title-bar"></div>
                        <div class="preview-content">
                            <div class="preview-line w80"></div>
                            <div class="preview-line w60"></div>
                            <div class="preview-line w70"></div>
                        </div>
                    </div>
                    <span class="template-name">ナチュラルグリーン</span>
                </div>
                <div class="template-card" data-template="elegant-red">
                    <div class="template-preview elegant-red-preview">
                        <div class="preview-title-bar"></div>
                        <div class="preview-content">
                            <div class="preview-line w80"></div>
                            <div class="preview-line w60"></div>
                            <div class="preview-line w70"></div>
                        </div>
                    </div>
                    <span class="template-name">エレガントレッド</span>
                </div>
                <div class="template-card" data-template="minimal-gray">
                    <div class="template-preview minimal-gray-preview">
                        <div class="preview-title-bar"></div>
                        <div class="preview-content">
                            <div class="preview-line w80"></div>
                            <div class="preview-line w60"></div>
                            <div class="preview-line w70"></div>
                        </div>
                    </div>
                    <span class="template-name">ミニマルグレー</span>
                </div>
            </div>
            <button class="btn btn-primary next-btn" onclick="goToStep(2)">次へ</button>
        </section>

        <!-- Step 2: コンテンツ入力 -->
        <section id="step2" class="step-content">
            <h2>スライドの内容を入力</h2>
            <div class="input-area">
                <div class="input-tabs">
                    <button class="tab-btn active" data-tab="text">テキスト入力</button>
                    <button class="tab-btn" data-tab="file">ファイルアップロード</button>
                </div>

                <div id="tab-text" class="tab-content active">
                    <textarea id="content-input" placeholder="スライドにしたい内容を入力してください。&#10;&#10;例：&#10;・新商品の提案書&#10;・四半期の売上報告&#10;・プロジェクトの進捗報告&#10;&#10;箇条書きでも文章でもOKです。AIが自動的に整理してスライドを構成します。"></textarea>
                </div>

                <div id="tab-file" class="tab-content">
                    <div class="file-upload-area" id="drop-zone">
                        <div class="upload-icon">&#128196;</div>
                        <p>ファイルをドラッグ＆ドロップ</p>
                        <p class="sub">または</p>
                        <label class="btn btn-outline file-label">
                            ファイルを選択
                            <input type="file" id="file-input" accept=".txt,.md,.csv" hidden>
                        </label>
                        <p class="file-types">対応形式: .txt, .md, .csv</p>
                    </div>
                    <div id="file-preview" class="file-preview" style="display:none;">
                        <div class="file-info">
                            <span id="file-name"></span>
                            <button class="btn-icon" onclick="clearFile()">&times;</button>
                        </div>
                        <textarea id="file-content" readonly></textarea>
                    </div>
                </div>

                <div class="options-row">
                    <label>
                        スライド枚数:
                        <select id="slide-count">
                            <option value="3">3枚</option>
                            <option value="5" selected>5枚</option>
                            <option value="8">8枚</option>
                            <option value="10">10枚</option>
                        </select>
                    </label>
                </div>
            </div>

            <div class="btn-row">
                <button class="btn btn-secondary" onclick="goToStep(1)">戻る</button>
                <button class="btn btn-primary" id="generate-btn" onclick="generateSlides()">
                    AIでスライド生成
                </button>
            </div>
        </section>

        <!-- Step 3: 生成中 -->
        <section id="step3" class="step-content">
            <div class="generating">
                <div class="spinner"></div>
                <h2>スライドを生成中...</h2>
                <p>AIが最適なレイアウトを考えています</p>
            </div>
        </section>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
