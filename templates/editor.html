<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スライドエディタ - AI Slide Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/editor.css') }}">
</head>
<body>
    <!-- ツールバー -->
    <header class="toolbar">
        <div class="toolbar-left">
            <a href="/" class="back-btn" title="トップに戻る">&larr;</a>
            <h1 class="toolbar-title">スライドエディタ</h1>
        </div>
        <div class="toolbar-center">
            <span class="slide-counter">
                スライド <span id="current-slide">1</span> / <span id="total-slides">0</span>
            </span>
        </div>
        <div class="toolbar-right">
            <button class="tool-btn" onclick="addSlide()" title="スライド追加">+ 追加</button>
            <button class="tool-btn" onclick="duplicateSlide()" title="複製">複製</button>
            <button class="tool-btn danger" onclick="deleteSlide()" title="削除">削除</button>
            <div class="toolbar-divider"></div>
            <button class="tool-btn primary" onclick="exportPDF()">PDF出力</button>
        </div>
    </header>

    <div class="editor-layout">
        <!-- 左: サムネイル一覧 -->
        <aside class="sidebar" id="sidebar">
            <!-- JSで生成 -->
        </aside>

        <!-- 中央: スライドプレビュー -->
        <main class="canvas-area">
            <div class="slide-wrapper">
                <div class="slide" id="slide-canvas">
                    <!-- JSで生成 -->
                </div>
            </div>
        </main>

        <!-- 右: プロパティパネル -->
        <aside class="properties" id="properties">
            <h3>プロパティ</h3>
            <p class="hint">スライド上の要素をクリックして編集</p>

            <div class="prop-section" id="text-props" style="display:none;">
                <h4>テキスト</h4>
                <div class="prop-row">
                    <label>フォントサイズ</label>
                    <input type="range" id="prop-font-size" min="12" max="72" value="24">
                    <span id="prop-font-size-val">24px</span>
                </div>
                <div class="prop-row">
                    <label>太さ</label>
                    <select id="prop-font-weight">
                        <option value="300">細い</option>
                        <option value="400">普通</option>
                        <option value="500">やや太い</option>
                        <option value="700" selected>太い</option>
                    </select>
                </div>
                <div class="prop-row">
                    <label>色</label>
                    <input type="color" id="prop-text-color" value="#202124">
                </div>
                <div class="prop-row">
                    <label>配置</label>
                    <div class="align-btns">
                        <button class="align-btn" data-align="left">左</button>
                        <button class="align-btn active" data-align="center">中</button>
                        <button class="align-btn" data-align="right">右</button>
                    </div>
                </div>
            </div>
        </aside>
    </div>

    <script src="{{ url_for('static', filename='js/editor.js') }}"></script>
</body>
</html>
