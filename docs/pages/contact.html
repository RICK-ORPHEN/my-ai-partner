<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ | AI SCHOOL</title>
  <meta name="description" content="AI SCHOOLへのお問い合わせフォーム。法人導入・取材・個人受講のご相談を受け付けています。">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <nav class="nav-bar">
    <div class="nav-inner">
      <a href="../index.html" class="nav-brand">AI SCHOOL</a>
      <div class="nav-links">
        <a href="./about.html">AIスクールとは</a>
        <a href="./corporate.html">法人向け</a>
        <a href="./individual.html">個人向け</a>
        <a href="./pricing.html">料金</a>
        <a href="./interactive-onboarding.html" class="nav-cta">無料相談</a>
      </div>
    </div>
  </nav>

  <main class="page-wrap">
    <section class="page-hero">
      <p class="label-en">CONTACT</p>
      <h1 class="page-title">お問い合わせ</h1>
      <p class="page-lead">法人導入・個人受講・取材など、お気軽にお問い合わせください。<br>通常 2 営業日以内にご返信いたします。</p>
    </section>

    <section class="container" style="max-width:720px;padding:48px 24px 96px;">
      <form class="contact-form" method="post" action="https://formspree.io/f/your-endpoint" novalidate>
        <label>
          <span>お名前 <em>*</em></span>
          <input type="text" name="name" required>
        </label>
        <label>
          <span>会社名 / 組織名</span>
          <input type="text" name="company">
        </label>
        <label>
          <span>メールアドレス <em>*</em></span>
          <input type="email" name="email" required>
        </label>
        <label>
          <span>業種</span>
          <select name="industry">
            <option value="">選択してください</option>
            <option>飲食</option>
            <option>小売</option>
            <option>不動産</option>
            <option>医療</option>
            <option>士業</option>
            <option>建設・製造</option>
            <option>美容</option>
            <option>教育</option>
            <option>その他</option>
          </select>
        </label>
        <label>
          <span>お問い合わせ種別 <em>*</em></span>
          <select name="type" required>
            <option value="">選択してください</option>
            <option>法人導入のご相談</option>
            <option>個人受講のご相談</option>
            <option>取材・メディア</option>
            <option>パートナーシップ</option>
            <option>その他</option>
          </select>
        </label>
        <label>
          <span>お問い合わせ内容 <em>*</em></span>
          <textarea name="message" rows="6" required></textarea>
        </label>
        <label class="consent">
          <input type="checkbox" required>
          <span><a href="./privacy.html">プライバシーポリシー</a>に同意します</span>
        </label>
        <button type="submit" class="btn btn-primary">送信する</button>
      </form>
      <p style="margin-top:32px;font-size:14px;color:#666;">※ フォームが利用できない場合は <a href="mailto:contact@ai-school.jp">contact@ai-school.jp</a> までご連絡ください。</p>
    </section>
  </main>

  <footer class="footer">
    <div class="footer-bottom">
      <span>&copy; 2026 AI SCHOOL PLATFORM</span>
      <div style="display:flex;gap:24px;">
        <a href="./terms.html">利用規約</a>
        <a href="./privacy.html">プライバシー</a>
        <a href="./tokushoho.html">特商法</a>
      </div>
    </div>
  </footer>
</body>
</html>
